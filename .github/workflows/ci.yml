name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-versions: "4.2 5.2"
          - python-version: "3.11"
            django-versions: "4.2 5.2"
          - python-version: "3.12"
            django-versions: "4.2 5.2 6.0"
          - python-version: "3.13"
            django-versions: "5.2 6.0"
          - python-version: "3.14"
            django-versions: "5.2 6.0"
            experimental: true

    name: tests (py${{ matrix.python-version }})
    continue-on-error: ${{ matrix.experimental == true }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install base dependencies
        run: |
          pip install -U pip
          pip install beautifulsoup4 html5lib pytest pytest-django pytest-cov
          pip install -e .

      - name: Run tests for each Django version
        run: |
          for dj in ${{ matrix.django-versions }}; do
            echo "::group::Django $dj"
            major="${dj%%.*}" && pip install -q "Django>=${dj},<$((major+1)).0"
            pytest -vv --cov=responsediff responsediff/
            echo "::endgroup::"
          done
        env:
          DJANGO_SETTINGS_MODULE: responsediff.tests.project.settings

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check responsediff
